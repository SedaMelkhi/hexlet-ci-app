name: hexlet-ci-app
on: push
jobs:
  build: # имя взято для примера
    runs-on: ubuntu-latest
    steps:
      # Клонируем репозиторий
      - uses: actions/checkout@v4
      - uses: hexlet-components/hello-from-hexlet-action@release
      # Устанавливаем Node.js
      - uses: actions/setup-node@v4
      - run: make install
      - run: make build
      - run: make test
      - run: make lint
