name: hexlet-ci-app
on: push
jobs:
  build: # имя взято для примера
    runs-on: ubuntu-latest
    steps:
      # Клонируем репозиторий
      - uses: actions/checkout@v4
      # Устанавливаем Node.js
      - uses: actions/setup-node@v4
      - run: make setup
      - run: make start
      - run: make test
      - run: make lint
